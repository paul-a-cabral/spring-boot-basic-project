spring.h2.console.enabled=true
spring.h2.console.settings.web-allow-others=true

# server.port=8282
# Trust the X-Forwarded-* headers from the reverse proxy so Swagger UI uses https
server.forward-headers-strategy=framework
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
# CRITICAL: Tell Hibernate to dynamically create tables, but NOT the users table.
# 'update' will see that Flyway already created the 'users' table and will skip it,
# but it will notice the other 3 tables are missing and create them!
# (Note: in prod, this should be 'validate')
spring.jpa.hibernate.ddl-auto=update
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.open-in-view=false
# To see the SQL statements being executed in console
spring.jpa.show-sql=true
spring.datasource.username=sa
spring.datasource.password=

# custom property
students.email.domain=my-domain.com

# remove fields with null values from your JSON responses (globally)
spring.jackson.default-property-inclusion=non_null

# enable Flyway to run your V1__create_users_table.sql script
spring.flyway.enabled=true

# Default security mode for local/dev and tests
app.security.authentication=JWT
