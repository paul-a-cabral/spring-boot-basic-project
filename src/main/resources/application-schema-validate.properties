# Profile for strict entity-to-schema validation.
# Run with: mvn -Dspring-boot.run.profiles=schema-validate spring-boot:run

# Flyway verifies migration integrity/history before Hibernate validates entities.
spring.flyway.enabled=true
spring.flyway.validate-on-migrate=true
spring.flyway.validate-migration-naming=true

# Hibernate validates mapped entities against the already-created schema.
# This fails fast on missing/wrong columns, constraints, or table names.
spring.jpa.hibernate.ddl-auto=validate
